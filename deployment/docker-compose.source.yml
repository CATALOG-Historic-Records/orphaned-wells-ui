services:
  backend:
    image: ${BACKEND_DEV_IMAGE:-orphaned-wells-ui-server-dev}
    working_dir: /code
    build:
      context: ${BACKEND_DIR:-../../orphaned-wells-ui-server}
      dockerfile: deployment/dockerfile
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/python-pycache
    command:
      - uvicorn
      - ogrre.main:app
      - --host
      - ${BACKEND_CONTAINER_HOST:-backend}
      - --port
      - "8001"
      - --reload
      - --reload-dir
      - /code/ogrre
      - --reload-delay
      - "1"
    volumes:
      - ${BACKEND_DIR:-../../orphaned-wells-ui-server}:/code
      - backend_logs:/logs
      - backend_data:/data
